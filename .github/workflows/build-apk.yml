name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  UV_PYTHON: "3.12"
  PYTHONUTF8: 1
  FLET_CLI_NO_RICH_OUTPUT: 1

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v6

      - name: Build APK
        run: uv run flet build apk --yes --verbose

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: berny-apk
          path: build/apk/*.apk
          if-no-files-found: warn
